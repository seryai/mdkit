name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  test:
    name: ${{ matrix.os }} / rust ${{ matrix.rust }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        rust: [stable]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          components: clippy, rustfmt

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build (default features)
        run: cargo build --verbose

      - name: Build (no default features)
        run: cargo build --no-default-features --verbose

      - name: Build (all features)
        run: cargo build --all-features --verbose

      - name: Test (all features)
        run: cargo test --all-features --verbose

  lint:
    name: lint (clippy + rustfmt)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - name: rustfmt
        run: cargo fmt --all -- --check
      - name: clippy (all features)
        run: cargo clippy --all-features --all-targets -- -D warnings

  msrv:
    # Bumped to 1.85 in v0.5.2: indexmap 2.14 (transitive via html2md /
    # calamine / pdfium-render) requires `edition = "2024"`, which was
    # only stabilised in Rust 1.85. Anything older fails to even parse
    # its Cargo.toml.
    name: MSRV (rust 1.85)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.85
      - uses: Swatinem/rust-cache@v2
      - name: Build on MSRV
        run: cargo build --verbose

  audit:
    name: cargo-audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - name: Run audit
        run: cargo audit
